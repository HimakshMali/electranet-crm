{% extends "crm/base.html" %}

{% block content %}
<style>
  .main-content,
  .content,
  .page-content {
    padding: 0 !important;
  }

  .production-page {
    min-height: 100vh;
    width: 100%;
    margin: 0;
    padding: 0;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;

    background:
      linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
      url("https://images.unsplash.com/photo-1722629155191-2e9a39a8f3f8?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: white;
  }

  .production-card {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 45px 35px;
    max-width: 520px;
    width: 90%;
    box-shadow: 0 15px 40px rgba(0,0,0,0.35);
  }

  .spinner {
    width: 70px;
    height: 70px;
    border: 7px solid rgba(255,255,255,0.3);
    border-top: 7px solid #ffffff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 25px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .invoice-btn {
    display: inline-block;
    padding: 14px 26px;
    background: #ffffff;
    color: #222;
    border-radius: 10px;
    font-weight: 600;
    text-decoration: none;
  }
</style>

<div class="production-page">
  <div class="production-card">
    <div class="spinner"></div>
    <h1>In Production</h1>
    <p>This page is currently being prepared .</p>
    <p>Till then enjoy the image of this deer lurking from flowers</p>

    <a href="{% url 'converted-leads' %}" class="invoice-btn">
      Please make invoice via converted-lead page .
    </a>
  </div>
</div>
{% endblock %}
