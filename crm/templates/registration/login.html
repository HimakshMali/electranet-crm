{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: 
                linear-gradient(rgba(251, 227, 227, 0.35), rgba(0,0,0,0.45)),
                url("https://images.pexels.com/photos/32589789/pexels-photo-32589789.jpeg?_gl=1*vohvic*_ga*MTIyMTYxNDE1My4xNzc1ODkyMjA4*_ga_8JE65Q40S6*czE3NzczMDc2MjQkbzQkZzEkdDE3NzczMDgwMTEkajMwJGwwJGgw");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 380px;
            padding: 35px;
            border-radius: 14px;
            background: rgba(189, 207, 234, 0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 20px 50px rgba(0,0,0,0.45);
            color: white;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 28px;
            font-size: 28px;
            font-weight: 700;
        }

        .login-box label {
            display: none;
        }

        .login-box input {
            width: 100%;
            padding: 12px 5px;
            margin-bottom: 20px;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.7);
            outline: none;
            color: white;
            font-size: 14px;
        }

        .login-box input::placeholder {
            color: rgba(255,255,255,0.85);
        }

        .login-box input:focus {
            border-bottom-color: white;
        }

        .helptext,
        .invalid-feedback,
        .alert,
        .errorlist {
            color: #ffb3b3;
            font-size: 13px;
            margin-bottom: 10px;
            list-style: none;
        }

        .extra-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .remember input {
            width: auto;
            margin: 0;
        }

        .extra-row a {
            color: white;
            text-decoration: none;
        }

        .extra-row a:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 3px;
            background: white;
            color: #111;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #e8e8e8;
        }

        .register-text {
            text-align: center;
            margin-top: 22px;
            font-size: 13px;
        }

        .register-text a {
            color: white;
            font-weight: 600;
            text-decoration: none;
        }

        .register-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 450px) {
            .login-box {
                width: 90%;
                padding: 28px;
            }
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <form method="post">
            {% csrf_token %}

            {{ form.non_field_errors }}

            <input type="text" name="username" placeholder="Enter your username or email" required>
            <input type="password" name="password" placeholder="Enter your password" required>

            <div class="extra-row">
                <label class="remember">
                    <input type="checkbox" name="remember">
                    Remember me
                </label>

                  
            </div>

            <button type="submit" class="login-btn">Log In</button>

            <p class="register-text">
                Don't have an account?
                <a href="{% url 'sign-up' %}">Register</a>
            </p>
        </form>
    </div>

</body>
</html>
